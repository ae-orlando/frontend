<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snippet Finder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">JavaScript Practice Project</p>
        <h1>Snippet Finder</h1>
        <p class="intro">
          Search through short learning notes using <code>includes()</code> and
          preview each one with <code>slice()</code>.
        </p>
      </section>

      <section class="panel">
        <label class="label" for="search">Search notes</label>
        <input
          id="search"
          class="search"
          type="text"
          placeholder="Try typing array, string, loop..."
        />
        <p id="result-count" class="result-count"></p>
        <div id="notes-list" class="notes-list"></div>
      </section>
    </main>

    <script src="slice-method.js"></script>
  </body>
</html>
